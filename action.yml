name: 'gitlance'
description: 'Vigilance for your Git commits'

inputs:
  check:
    description: 'Check to run: wip-fixup, signed-off-by, conventional-commits, all (default: all)'
    required: false
    default: 'all'
  base:
    description: 'Base git reference - commit SHA, branch, tag, or HEAD~n (auto-detected from PR if available)'
    required: false
    default: ''
  head:
    description: 'Head git reference - commit SHA, branch, tag, or HEAD~n (auto-detected from PR if available)'
    required: false
    default: ''
  skip-merge-commits:
    description: 'Skip merge commits in validation (default: false, all commits are checked)'
    required: false
    default: 'false'

outputs:
  passed:
    description: 'Whether the check passed (true/false)'
    value: ${{ steps.run-check.outputs.passed }}

runs:
  using: 'composite'
  steps:
    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@1.96.0

    - name: Download gitlance binary and run checks
      id: run-check
      shell: bash
      env:
        CHECK_TYPE: ${{ inputs.check }}
        PROVIDED_BASE_REF: ${{ inputs.base }}
        PROVIDED_HEAD_REF: ${{ inputs.head }}
        SKIP_MERGE_COMMITS: ${{ inputs.skip-merge-commits }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        set -e

        # Set default output
        echo "passed=false" >> "$GITHUB_OUTPUT"

        # Set binary paths
        GITLANCE_BINARY="${{ runner.temp }}/gitlance"
        GITLANCE_BINARY_SHA256="${{ runner.temp }}/gitlance.sha256"

        # Try to download pre-built binary if action ref is specified
        # Note: Prebuilt binaries are only available for immutable release tags (e.g., v1.2.3).
        # Moving tags like @v1 will fall back to building from source.
        VERSION="${{ github.action_ref }}"
        if [ -n "$VERSION" ]; then
          DOWNLOAD_URL="https://github.com/canonical/gitlance/releases/download/$VERSION/gitlance"
          echo "::notice::Attempting to download release $VERSION"
          if curl -fsSL "$DOWNLOAD_URL" -o "$GITLANCE_BINARY" && \
             curl -fsSL "${DOWNLOAD_URL}.sha256" -o "$GITLANCE_BINARY_SHA256" && \
             (cd "${{ runner.temp }}" && sha256sum -c gitlance.sha256 2>/dev/null); then
            echo "::notice::Successfully downloaded and verified $VERSION"
          else
            echo "::warning::Download failed for $VERSION, will build from source"
            rm -f "$GITLANCE_BINARY" "$GITLANCE_BINARY_SHA256"
          fi
        fi

        # Build from source if binary not available
        if [ ! -f "$GITLANCE_BINARY" ]; then
          echo "::notice::Building from source at ${{ github.action_path }}"
          (
            cd "${{ github.action_path }}"
            cargo build --release --locked --quiet
            cp target/release/gitlance "$GITLANCE_BINARY"
          )
        fi

        chmod +x "$GITLANCE_BINARY"

        # Resolve refs with priority: provided > PR context > empty
        BASE_REF="${PROVIDED_BASE_REF:-$PR_BASE_SHA}"
        HEAD_REF="${PROVIDED_HEAD_REF:-$PR_HEAD_SHA}"

        # Build command with optional check type and ref flags
        CMD_ARGS=()
        if [ "$CHECK_TYPE" != "all" ]; then
          CMD_ARGS+=("$CHECK_TYPE")
        fi
        if [ -n "$BASE_REF" ]; then
          CMD_ARGS+=("--base" "$BASE_REF")
        fi
        if [ -n "$HEAD_REF" ]; then
          CMD_ARGS+=("--head" "$HEAD_REF")
        fi
        CMD_ARGS+=("--repo" ".")
        
        # Add skip-merge-commits flag if requested
        if [ "$SKIP_MERGE_COMMITS" = "true" ]; then
          CMD_ARGS+=("--skip-merge-commits")
        fi

        # Run the binary
        "$GITLANCE_BINARY" "${CMD_ARGS[@]}"

        # If we get here, the check passed
        echo "passed=true" >> "$GITHUB_OUTPUT"

branding:
  icon: 'check-circle'
  color: 'green'
