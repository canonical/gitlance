name: 'gitlance'
description: 'Vigilance for your Git commit'

inputs:
  check:
    description: 'Check to run: wip-fixup, signed-off-by, conventional-commits, all (default: all)'
    required: false
    default: 'all'
  base-sha:
    description: 'Base commit SHA (auto-detected from PR if available)'
    required: false
    default: ''
  head-sha:
    description: 'Head commit SHA (auto-detected from PR if available)'
    required: false
    default: ''

outputs:
  passed:
    description: 'Whether the check passed (true/false)'
    value: ${{ steps.run-check.outputs.passed }}

runs:
  using: 'composite'
  steps:
    - name: Download pre-built binary
      shell: bash
      run: |
        # Extract version from action ref (e.g., v0.1.0)
        VERSION="${{ github.action_ref }}"

        # If no version specified, use latest release
        if [ -z "$VERSION" ]; then
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/agherzan/gitlance/releases/latest | grep 'browser_download_url' | grep 'gitlance' | cut -d '"' -f 4)
        else
          DOWNLOAD_URL="https://github.com/agherzan/gitlance/releases/download/$VERSION/gitlance"
        fi

        if [ -z "$DOWNLOAD_URL" ]; then
          echo "::error::Failed to determine binary download URL for version: $VERSION"
          exit 1
        fi

        # Download and make executable
        mkdir -p "${{ runner.temp }}/gitlance"
        if ! curl -fsSL "$DOWNLOAD_URL" -o "${{ runner.temp }}/gitlance/gitlance"; then
          echo "::error::Failed to download binary from $DOWNLOAD_URL"
          exit 1
        fi

        # Download and verify checksum
        if ! curl -fsSL "${DOWNLOAD_URL}.sha256" -o "${{ runner.temp }}/gitlance/gitlance.sha256"; then
          echo "::error::Failed to download checksum file"
          exit 1
        fi

        cd "${{ runner.temp }}/gitlance"
        if ! sha256sum -c gitlance.sha256; then
          echo "::error::Checksum verification failed"
          exit 1
        fi

        chmod +x "${{ runner.temp }}/gitlance/gitlance"
        echo "gitlance_binary=${{ runner.temp }}/gitlance/gitlance" >> $GITHUB_ENV

    - name: Run commit checks
      id: run-check
      shell: bash
      env:
        CHECK_TYPE: ${{ inputs.check }}
        PROVIDED_BASE_SHA: ${{ inputs.base-sha }}
        PROVIDED_HEAD_SHA: ${{ inputs.head-sha }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        # Resolve base SHA with priority: provided > PR context > empty
        if [ -n "$PROVIDED_BASE_SHA" ]; then
          BASE_SHA="$PROVIDED_BASE_SHA"
        else
          BASE_SHA="$PR_BASE_SHA"
        fi

        # Resolve head SHA with priority: provided > PR context > empty
        if [ -n "$PROVIDED_HEAD_SHA" ]; then
          HEAD_SHA="$PROVIDED_HEAD_SHA"
        else
          HEAD_SHA="$PR_HEAD_SHA"
        fi

        # Run the binary
        if [ "$CHECK_TYPE" = "all" ]; then
          "${{ env.gitlance_binary }}" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --repo .
        else
          "${{ env.pr_commit_checks_binary }}" "$CHECK_TYPE" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --repo .
        fi

        # Capture exit code
        EXIT_CODE=$?

        # Set output
        if [ $EXIT_CODE -eq 0 ]; then
          echo "passed=true" >> $GITHUB_OUTPUT
        else
          echo "passed=false" >> $GITHUB_OUTPUT
        fi

        exit $EXIT_CODE

branding:
  icon: 'check-circle'
  color: 'green'
